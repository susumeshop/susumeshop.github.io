<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DIY Gallery</title>

  
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:sans-serif;
background:#f5f5f5;
}

.container{
display:flex;
min-height:100vh;
}

/* 왼쪽 메뉴 */

.sidebar{
width:220px;
padding:50px 30px;
background:white;
position:fixed;
height:100%;
}

.logo{
font-size:32px;
margin-bottom:60px;
}

.menu a{
display:block;
margin:20px 0;
text-decoration:none;
color:#555;
padding:8px 12px;
border-radius:6px;
}

.menu a.active{
background:#222;
color:white;
font-weight:bold;
}

/* 작품 영역 */

.gallery{
margin-left:220px;
padding:40px;
flex:1;

display:grid;
grid-template-columns:
repeat(auto-fill,minmax(300px,1fr));

gap:20px;
}

.card img{
width:100%;
display:block;
}

.card{
background:white;
overflow:hidden;
}

.card p{
padding:10px;
}

  .modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
width:600px;
max-width:90%;
background:white;
}

.modal.show{
display:flex;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
SUSUME DIY
</div>

</div>

     onclick="openModal('309A9BA9-8354-44FF-99A4-541F1B20890B.jpg')">
<p>LAVA 컵1</p>
</div>

<div class="card">

</div>

</div>

</div>

  <div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImage">
</div>

<script>
function openModal(src){
  document.getElementById('modalImage').src = src;
  document.getElementById('modal').classList.add('show');
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}
</script>
  
</body>
</html>
