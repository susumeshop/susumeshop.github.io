<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DIY Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:sans-serif;
background:#f5f5f5;
}

.container{
display:flex;
min-height:100vh;
}

/* 왼쪽 메뉴 */

.sidebar{
width:220px;
padding:50px 30px;
background:white;
position:fixed;
height:100%;
}

.logo{
font-size:32px;
margin-bottom:60px;
}

.menu a{
display:block;
margin:20px 0;
text-decoration:none;
color:#555;
}

/* 작품 영역 */

.gallery{
margin-left:220px;
padding:40px;
flex:1;

display:grid;
grid-template-columns:
repeat(auto-fill,minmax(300px,1fr));

gap:20px;
}

.card img{
width:100%;
display:block;
}

.card{
background:white;
overflow:hidden;
}

.card p{
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
DIY
</div>

<div class="menu">
<a href="#">ABOUT</a>
<a href="#">WORKS</a>
<a href="#">CONTACT</a>
</div>

</div>

<div class="gallery">

<div class="card">
<img src="project1.jpg">
<p>원목 선반</p>
</div>

<div class="card">
<img src="project2.jpg">
<p>LED 무드등</p>
</div>

<div class="card">
<img src="project3.jpg">
<p>미니어처</p>
</div>

<div class="card">
<img src="project4.jpg">
<p>DIY 프로젝트</p>
</div>

<div class="card">
<img src="project5.jpg">
<p>DIY 프로젝트</p>
</div>

<div class="card">
<img src="project6.jpg">
<p>DIY 프로젝트</p>
</div>

</div>

</div>

</body>
</html>
